name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check out Hypercolor client
        env:
          HYPERCOLOR_TOKEN: ${{ secrets.HYPERCOLOR_TOKEN }}
        run: |
          if [ -n "${HYPERCOLOR_TOKEN}" ]; then
            git clone --depth 1 \
              "https://x-access-token:${HYPERCOLOR_TOKEN}@github.com/hyperb1iss/hypercolor.git" \
              ../hypercolor
          else
            git clone --depth 1 https://github.com/hyperb1iss/hypercolor ../hypercolor
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Sync (locked)
        run: uv sync --all-groups --locked

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Typecheck
        run: uv run ty check

      - name: Test
        run: uv run pytest

      - name: Metadata
        run: uv run python scripts/check_integration_metadata.py

      - name: Build
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  hassfest:
    name: Home Assistant hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    # HACS validation walks the public GitHub API, so it can only run while
    # the repo is public. Flip the repo visibility and this job lights up.
    if: ${{ github.event.repository.visibility == 'public' }}
    steps:
      - uses: actions/checkout@v5
      - uses: hacs/action@main
        with:
          category: integration
          # Temporary until hypercolor is listed in home-assistant/brands
          # (icon/logo submission upstream). Drop this line once merged.
          ignore: brands

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [verify, hassfest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
